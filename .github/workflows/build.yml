name: Build & Package

on:
  push:
    branches: [main]
  workflow_dispatch:  # manual trigger

jobs:
  # ============================================================
  # macOS Build (Universal Binary: arm64 + x86_64)
  # ============================================================
  build-macos:
    runs-on: macos-14  # Apple Silicon runner (has Rosetta for x86_64)
    steps:
      - uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          echo "=== System Info ==="
          uname -a
          sw_vers
          cmake --version

      - name: Install ONNX Runtime
        run: |
          # Download both arm64 and x86_64 builds
          curl -LO https://github.com/microsoft/onnxruntime/releases/download/v1.17.1/onnxruntime-osx-arm64-1.17.1.tgz
          curl -LO https://github.com/microsoft/onnxruntime/releases/download/v1.17.1/onnxruntime-osx-x86_64-1.17.1.tgz
          tar xzf onnxruntime-osx-arm64-1.17.1.tgz
          tar xzf onnxruntime-osx-x86_64-1.17.1.tgz

          # Create universal ORT dylib via lipo
          mkdir -p onnxruntime-universal/lib onnxruntime-universal/include
          cp -R onnxruntime-osx-arm64-1.17.1/include/* onnxruntime-universal/include/

          # Resolve symlinks and create universal dylib
          ARM_LIB=$(readlink -f onnxruntime-osx-arm64-1.17.1/lib/libonnxruntime.dylib || echo onnxruntime-osx-arm64-1.17.1/lib/libonnxruntime.dylib)
          X86_LIB=$(readlink -f onnxruntime-osx-x86_64-1.17.1/lib/libonnxruntime.dylib || echo onnxruntime-osx-x86_64-1.17.1/lib/libonnxruntime.dylib)
          lipo -create "$ARM_LIB" "$X86_LIB" -output onnxruntime-universal/lib/libonnxruntime.dylib

          # Fix the install name to match the filename (removes versioned name)
          # This ensures the linker records @rpath/libonnxruntime.dylib, not
          # @rpath/libonnxruntime.1.17.1.dylib, so BUILD_RPATH works correctly
          # when juce_vst3_helper tries to dlopen the plugin during build.
          install_name_tool -id "@rpath/libonnxruntime.dylib" onnxruntime-universal/lib/libonnxruntime.dylib

          # Also create versioned symlink as fallback
          ln -sf libonnxruntime.dylib onnxruntime-universal/lib/libonnxruntime.1.17.1.dylib

          echo "=== Universal dylib ==="
          file onnxruntime-universal/lib/libonnxruntime.dylib
          otool -D onnxruntime-universal/lib/libonnxruntime.dylib

      - name: Configure arm64
        run: |
          cmake -B build-arm64 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DONNXRUNTIME_ROOT=${{ github.workspace }}/onnxruntime-universal \
            -DBUILD_TESTS=ON

      - name: Build arm64
        run: cmake --build build-arm64 --config Release --parallel

      - name: Configure x86_64
        run: |
          cmake -B build-x86_64 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=x86_64 \
            -DONNXRUNTIME_ROOT=${{ github.workspace }}/onnxruntime-universal \
            -DBUILD_TESTS=OFF

      - name: Build x86_64
        run: cmake --build build-x86_64 --config Release --parallel

      - name: Create Universal Bundles
        run: |
          # Determine artefacts dirs (single-config vs multi-config)
          if [ -d build-arm64/DeFeedbackPro_artefacts/Release ]; then
            ARM_DIR="build-arm64/DeFeedbackPro_artefacts/Release"
            X86_DIR="build-x86_64/DeFeedbackPro_artefacts/Release"
          else
            ARM_DIR="build-arm64/DeFeedbackPro_artefacts"
            X86_DIR="build-x86_64/DeFeedbackPro_artefacts"
          fi

          # Create output dir with arm64 bundle as base
          mkdir -p build/DeFeedbackPro_artefacts/Release
          cp -R "$ARM_DIR/VST3" "build/DeFeedbackPro_artefacts/Release/"

          if [ -d "$ARM_DIR/AU" ]; then
            cp -R "$ARM_DIR/AU" "build/DeFeedbackPro_artefacts/Release/"
          fi

          # Copy models to build/models for packaging script
          cp -R build-arm64/models build/models

          # Lipo VST3 binary
          VST3_ARM="$ARM_DIR/VST3/DeFeedback Pro.vst3/Contents/MacOS/DeFeedback Pro"
          VST3_X86="$X86_DIR/VST3/DeFeedback Pro.vst3/Contents/MacOS/DeFeedback Pro"
          VST3_OUT="build/DeFeedbackPro_artefacts/Release/VST3/DeFeedback Pro.vst3/Contents/MacOS/DeFeedback Pro"

          echo "=== Creating universal VST3 binary ==="
          lipo -create "$VST3_ARM" "$VST3_X86" -output "$VST3_OUT"
          file "$VST3_OUT"

          # Lipo AU binary if present
          AU_ARM="$ARM_DIR/AU/DeFeedback Pro.component/Contents/MacOS/DeFeedback Pro"
          AU_X86="$X86_DIR/AU/DeFeedback Pro.component/Contents/MacOS/DeFeedback Pro"
          if [ -f "$AU_ARM" ] && [ -f "$AU_X86" ]; then
            AU_OUT="build/DeFeedbackPro_artefacts/Release/AU/DeFeedback Pro.component/Contents/MacOS/DeFeedback Pro"
            echo "=== Creating universal AU binary ==="
            lipo -create "$AU_ARM" "$AU_X86" -output "$AU_OUT"
            file "$AU_OUT"
          fi

          # Replace ORT dylib with universal version in bundles
          for BUNDLE in $(find build/DeFeedbackPro_artefacts -name "*.vst3" -o -name "*.component" 2>/dev/null); do
            FW_DIR="$BUNDLE/Contents/Frameworks"
            if [ -d "$FW_DIR" ]; then
              cp onnxruntime-universal/lib/libonnxruntime.dylib "$FW_DIR/libonnxruntime.dylib"
            fi
          done

      - name: Fix Install Names and Codesign
        run: |
          for BUNDLE in $(find build/DeFeedbackPro_artefacts -name "*.vst3" -o -name "*.component" 2>/dev/null); do
            echo "=== Processing: $BUNDLE ==="
            BINARY=$(find "$BUNDLE/Contents/MacOS" -name "DeFeedback Pro" -type f 2>/dev/null | head -1)
            if [ -z "$BINARY" ]; then continue; fi

            # Fix any ORT reference to @loader_path
            ORT_REF=$(otool -L "$BINARY" | grep libonnxruntime | awk '{print $1}')
            if [ -n "$ORT_REF" ]; then
              install_name_tool -change "$ORT_REF" \
                "@loader_path/../Frameworks/libonnxruntime.dylib" "$BINARY"
            fi

            # Fix dylib id
            FW="$BUNDLE/Contents/Frameworks/libonnxruntime.dylib"
            if [ -f "$FW" ]; then
              install_name_tool -id "@loader_path/../Frameworks/libonnxruntime.dylib" "$FW"
            fi

            # Codesign
            codesign --force --sign "-" --deep "$BUNDLE"

            echo "  Binary arch: $(file "$BINARY" | sed 's/.*: //')"
            echo "  ORT ref: $(otool -L "$BINARY" | grep onnxruntime | awk '{print $1}')"
            echo "  ORT arch: $(file "$FW" 2>/dev/null | sed 's/.*: //' || echo 'N/A')"
            echo ""
          done

      - name: Run Tests
        run: |
          find build-arm64 -name "DeFeedbackProTests" -type f -perm +111 | head -1 | xargs -I{} {} || true

      - name: Create .pkg Installer
        run: |
          chmod +x scripts/package_macos.sh
          bash scripts/package_macos.sh build

      - name: Upload macOS Installer
        uses: actions/upload-artifact@v4
        with:
          name: DeFeedback-Pro-macOS-Installer
          path: DeFeedback_Pro_Installer.pkg
          if-no-files-found: warn

      - name: Upload VST3 (standalone)
        uses: actions/upload-artifact@v4
        with:
          name: DeFeedback-Pro-macOS-VST3
          path: build/DeFeedbackPro_artefacts/Release/VST3/
          if-no-files-found: warn

      - name: Upload AU (standalone)
        uses: actions/upload-artifact@v4
        with:
          name: DeFeedback-Pro-macOS-AU
          path: build/DeFeedbackPro_artefacts/Release/AU/
          if-no-files-found: warn

  # ============================================================
  # Windows Build (x64)
  # ============================================================
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ONNX Runtime
        run: |
          curl -LO https://github.com/microsoft/onnxruntime/releases/download/v1.17.1/onnxruntime-win-x64-1.17.1.zip
          Expand-Archive onnxruntime-win-x64-1.17.1.zip -DestinationPath .

      - name: Configure CMake
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DONNXRUNTIME_ROOT="${{ github.workspace }}/onnxruntime-win-x64-1.17.1" `
            -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Run Tests
        run: ./build/Release/DeFeedbackProTests.exe
        continue-on-error: true

      - name: Stage Installer Files
        run: |
          New-Item -ItemType Directory -Force -Path build/installer_staging/vst3
          New-Item -ItemType Directory -Force -Path build/installer_staging/models
          Copy-Item -Recurse "build/DeFeedbackPro_artefacts/Release/VST3/DeFeedback Pro.vst3" "build/installer_staging/vst3/"
          Copy-Item "onnxruntime-win-x64-1.17.1/lib/onnxruntime.dll" "build/installer_staging/vst3/"
          Copy-Item "build/models/nsnet2.onnx" "build/installer_staging/models/"
          Copy-Item "scripts/install_windows.ps1" "build/installer_staging/"

      - name: Create ZIP Package
        run: |
          Compress-Archive -Path "build/installer_staging/*" -DestinationPath "DeFeedback_Pro_Windows.zip" -Force

      - name: Upload Windows ZIP
        uses: actions/upload-artifact@v4
        with:
          name: DeFeedback-Pro-Windows-Installer
          path: DeFeedback_Pro_Windows.zip

      - name: Upload VST3 (standalone)
        uses: actions/upload-artifact@v4
        with:
          name: DeFeedback-Pro-Windows-VST3
          path: build/DeFeedbackPro_artefacts/Release/VST3/

  # ============================================================
  # Create GitHub Release (on tag push)
  # ============================================================
  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            DeFeedback-Pro-macOS-Installer/DeFeedback_Pro_Installer.pkg
            DeFeedback-Pro-Windows-Installer/DeFeedback_Pro_Windows.zip
          generate_release_notes: true
