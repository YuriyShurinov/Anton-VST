name: Build & Package

on:
  push:
    branches: [main]
  workflow_dispatch:  # manual trigger

jobs:
  # ============================================================
  # macOS Build (Apple Silicon arm64)
  # ============================================================
  build-macos:
    runs-on: macos-14  # Apple Silicon runner
    steps:
      - uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          echo "=== System Info ==="
          uname -a
          sw_vers
          echo "=== Xcode versions available ==="
          ls -d /Applications/Xcode*.app 2>/dev/null || true
          echo "=== Default Xcode ==="
          xcode-select -p
          xcodebuild -version
          echo "=== CMake version ==="
          cmake --version

      - name: Install ONNX Runtime
        run: |
          curl -LO https://github.com/microsoft/onnxruntime/releases/download/v1.17.1/onnxruntime-osx-arm64-1.17.1.tgz
          tar xzf onnxruntime-osx-arm64-1.17.1.tgz
          echo "=== ONNX Runtime contents ==="
          ls -la onnxruntime-osx-arm64-1.17.1/lib/
          ls -la onnxruntime-osx-arm64-1.17.1/include/
          echo "=== ONNX Runtime dylib install name ==="
          otool -D onnxruntime-osx-arm64-1.17.1/lib/libonnxruntime.dylib
          echo "=== File type ==="
          file onnxruntime-osx-arm64-1.17.1/lib/libonnxruntime.dylib
          # Ensure libonnxruntime.dylib is a real file (not just symlink)
          # If it's a symlink, resolve it
          if [ -L onnxruntime-osx-arm64-1.17.1/lib/libonnxruntime.dylib ]; then
            echo "libonnxruntime.dylib is a symlink, resolving..."
            REAL=$(readlink -f onnxruntime-osx-arm64-1.17.1/lib/libonnxruntime.dylib)
            cp "$REAL" onnxruntime-osx-arm64-1.17.1/lib/libonnxruntime.dylib.real
            rm onnxruntime-osx-arm64-1.17.1/lib/libonnxruntime.dylib
            mv onnxruntime-osx-arm64-1.17.1/lib/libonnxruntime.dylib.real onnxruntime-osx-arm64-1.17.1/lib/libonnxruntime.dylib
            echo "Resolved. New install name:"
            otool -D onnxruntime-osx-arm64-1.17.1/lib/libonnxruntime.dylib
          fi

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DONNXRUNTIME_ROOT=${{ github.workspace }}/onnxruntime-osx-arm64-1.17.1 \
            -DBUILD_TESTS=ON \
            2>&1 | tee cmake_configure_output.log
        continue-on-error: true

      - name: Upload CMake Log (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cmake-configure-log
          path: cmake_configure_output.log
          if-no-files-found: warn

      - name: Check CMake succeeded
        run: |
          if [ ! -f build/CMakeCache.txt ]; then
            echo "CMake configuration FAILED. See cmake-configure-log artifact for details."
            echo "=== Last 100 lines of cmake output ==="
            tail -100 cmake_configure_output.log 2>/dev/null || true
            exit 1
          fi
          echo "CMake configuration succeeded!"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Fix and Verify Bundles
        run: |
          # Fix install names for all plugin bundles
          for BUNDLE in $(find build -name "*.vst3" -o -name "*.component" | head -5); do
            echo "=== Processing: $BUNDLE ==="
            BINARY=$(find "$BUNDLE" -name "DeFeedback Pro" -type f 2>/dev/null | head -1)
            if [ -z "$BINARY" ]; then
              echo "  No binary found, skipping"
              continue
            fi

            echo "  Binary: $BINARY"
            echo "  Dependencies:"
            otool -L "$BINARY"

            # Find any @rpath/libonnxruntime reference and fix it
            ORT_REF=$(otool -L "$BINARY" | grep libonnxruntime | awk '{print $1}')
            if [ -n "$ORT_REF" ]; then
              echo "  Current ORT reference: $ORT_REF"
              FRAMEWORKS_DIR="$BUNDLE/Contents/Frameworks"
              if [ -d "$FRAMEWORKS_DIR" ]; then
                echo "  Frameworks dir exists:"
                ls -la "$FRAMEWORKS_DIR/"
                # Fix the reference regardless of what the original name is
                install_name_tool -change "$ORT_REF" \
                  "@loader_path/../Frameworks/libonnxruntime.dylib" \
                  "$BINARY" || true
                # Fix the dylib's own id
                install_name_tool -id "@loader_path/../Frameworks/libonnxruntime.dylib" \
                  "$FRAMEWORKS_DIR/libonnxruntime.dylib" || true
                echo "  After fix:"
                otool -L "$BINARY" | grep onnxruntime
              else
                echo "  WARNING: No Frameworks directory!"
              fi
            fi

            echo "  Models:"
            ls -la "$BUNDLE/Contents/Resources/models/" 2>/dev/null || echo "  WARNING: No models!"

            # Re-codesign after fixes
            codesign --force --sign "-" --deep "$BUNDLE"
            echo ""
          done

      - name: Run Tests
        run: |
          find build -name "DeFeedbackProTests" -type f -perm +111 | head -1 | xargs -I{} {} || true

      - name: Create .pkg Installer
        run: |
          chmod +x scripts/package_macos.sh
          bash scripts/package_macos.sh build

      - name: Upload macOS Installer
        uses: actions/upload-artifact@v4
        with:
          name: DeFeedback-Pro-macOS-Installer
          path: DeFeedback_Pro_Installer.pkg
          if-no-files-found: warn

      - name: Upload VST3 (standalone)
        uses: actions/upload-artifact@v4
        with:
          name: DeFeedback-Pro-macOS-VST3
          path: |
            build/DeFeedbackPro_artefacts/Release/VST3/
            build/DeFeedbackPro_artefacts/VST3/
          if-no-files-found: warn

      - name: Upload AU (standalone)
        uses: actions/upload-artifact@v4
        with:
          name: DeFeedback-Pro-macOS-AU
          path: |
            build/DeFeedbackPro_artefacts/Release/AU/
            build/DeFeedbackPro_artefacts/AU/
          if-no-files-found: warn

  # ============================================================
  # Windows Build (x64)
  # ============================================================
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ONNX Runtime
        run: |
          curl -LO https://github.com/microsoft/onnxruntime/releases/download/v1.17.1/onnxruntime-win-x64-1.17.1.zip
          Expand-Archive onnxruntime-win-x64-1.17.1.zip -DestinationPath .

      - name: Configure CMake
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DONNXRUNTIME_ROOT="${{ github.workspace }}/onnxruntime-win-x64-1.17.1" `
            -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Run Tests
        run: ./build/Release/DeFeedbackProTests.exe
        continue-on-error: true

      - name: Stage Installer Files
        run: |
          New-Item -ItemType Directory -Force -Path build/installer_staging/vst3
          New-Item -ItemType Directory -Force -Path build/installer_staging/models
          Copy-Item -Recurse "build/DeFeedbackPro_artefacts/Release/VST3/DeFeedback Pro.vst3" "build/installer_staging/vst3/"
          Copy-Item "onnxruntime-win-x64-1.17.1/lib/onnxruntime.dll" "build/installer_staging/vst3/"
          Copy-Item "build/models/nsnet2.onnx" "build/installer_staging/models/"
          Copy-Item "scripts/install_windows.ps1" "build/installer_staging/"

      - name: Create ZIP Package
        run: |
          Compress-Archive -Path "build/installer_staging/*" -DestinationPath "DeFeedback_Pro_Windows.zip" -Force

      - name: Upload Windows ZIP
        uses: actions/upload-artifact@v4
        with:
          name: DeFeedback-Pro-Windows-Installer
          path: DeFeedback_Pro_Windows.zip

      - name: Upload VST3 (standalone)
        uses: actions/upload-artifact@v4
        with:
          name: DeFeedback-Pro-Windows-VST3
          path: build/DeFeedbackPro_artefacts/Release/VST3/

  # ============================================================
  # Create GitHub Release (on tag push)
  # ============================================================
  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            DeFeedback-Pro-macOS-Installer/DeFeedback_Pro_Installer.pkg
            DeFeedback-Pro-Windows-Installer/DeFeedback_Pro_Windows.zip
          generate_release_notes: true
